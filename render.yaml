services:
  - type: web
    name: itas-backend
    env: python
    rootDir: itas-backend
    buildCommand: "pip install -r requirements.txt && python -m nltk.downloader punkt averaged_perceptron_tagger maxent_ne_chunker words && python -m spacy download en_core_web_sm || true && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn itas.wsgi --log-file -"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: itas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "itas.settings.production"
      # For free plan, we cannot use Redis or Celery Workers
      # We override the broker URLs to avoid connecting to localhost redis
      - key: CELERY_BROKER_URL
        value: "memory://"
      - key: CELERY_RESULT_BACKEND
        value: "cache+memory://"
      - key: REDIS_URL
        value: ""
    plan: free

databases:
  - name: itas-db
    databaseName: itas
    user: itas_user
    plan: free
